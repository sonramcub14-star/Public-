// ─── CART REDUCER ─────────────────────────────────────────────────────────────
function cartReducer(state,action){
  switch(action.type){
    case"ADD":{const ex=state.find(i=>i.id===action.product.id);if(ex)return state.map(i=>i.id===action.product.id?{...i,qty:i.qty+1}:i);return[...state,{...action.product,qty:1}];}
    case"REMOVE":return state.filter(i=>i.id!==action.id);
    case"UPDATE_QTY":return state.map(i=>i.id===action.id?{...i,qty:Math.max(1,action.qty)}:i);
    case"CLEAR":return[];
    default:return state;
  }
}

// ─── AUTH ──────────────────────────────────────────────────────────────────────
function AuthPage({onLogin}){
  const[mode,setMode]=useState("login");
  const[lEmail,setLEmail]=useState(""),[ lPass,setLPass]=useState(""),[ lErr,setLErr]=useState("");
  const[rName,setRName]=useState(""),[ rEmail,setREmail]=useState(""),[ rPass,setRPass]=useState("");
  const[rPass2,setRPass2]=useState(""),[ rPhone,setRPhone]=useState(""),[ rErr,setRErr]=useState(""),[ rOk,setROk]=useState("");

  function handleLogin(){
    if(lEmail===ADMIN_ACCOUNT.email&&lPass===ADMIN_ACCOUNT.password){onLogin(ADMIN_ACCOUNT);return;}
    // check Firebase users
    db.ref("users").orderByChild("email").equalTo(lEmail).once("value",snap=>{
      let found=null;
      snap.forEach(c=>{const u=c.val();if(u.password===lPass)found={...u,uid:c.key};});
      if(!found){setLErr("อีเมลหรือรหัสผ่านไม่ถูกต้อง");return;}
      setLErr("");onLogin(found);
    });
  }

  function handleRegister(){
    if(!rName.trim()){setRErr("กรุณากรอกชื่อ-นามสกุล");return;}
    if(!rEmail.includes("@")){setRErr("รูปแบบอีเมลไม่ถูกต้อง");return;}
    if(rPass.length<6){setRErr("รหัสผ่านต้องมีอย่างน้อย 6 ตัว");return;}
    if(rPass!==rPass2){setRErr("รหัสผ่านไม่ตรงกัน");return;}
    // check duplicate email
    db.ref("users").orderByChild("email").equalTo(rEmail).once("value",snap=>{
      if(snap.exists()){setRErr("อีเมลนี้ถูกใช้งานแล้ว");return;}
      const newRef=db.ref("users").push();
      newRef.set({name:rName.trim(),email:rEmail.trim(),password:rPass,phone:rPhone,role:"customer",
        joinDate:new Date().toLocaleDateString("th-TH")});
      setROk("สมัครสำเร็จ! กำลังพาไปหน้าล็อกอิน...");
      setTimeout(()=>{setMode("login");setLEmail(rEmail);setROk("");},1400);
    });
  }

  return(

// ─── SHOP ─────────────────────────────────────────────────────────────────────
function ShopView({products,cart,dispatch,cartOpen,setCartOpen,user,onOrderPlaced}){
  const[filter,setFilter]=useState("ทั้งหมด");
  const[success,setSuccess]=useState(false);
  const cats=["ทั้งหมด",...Array.from(new Set(products.map(p=>p.category)))];
  const filtered=filter==="ทั้งหมด"?products:products.filter(p=>p.category===filter);
  const totalQty=cart.reduce((s,i)=>s+i.qty,0);
  const totalPrice=cart.reduce((s,i)=>s+i.qty*i.price,0);

  function handleCheckout(){
    const order={
      userId:user.id||user.uid||"guest",
      userName:user.name,
      items:cart.map(i=>({id:i.id,name:i.name,price:i.price,qty:i.qty,image:i.image})),
      total:totalPrice,
      status:"รอดำเนินการ",
      date:new Date().toLocaleDateString("th-TH",{day:"2-digit",month:"short",year:"numeric"})+" "+new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}),
      createdAt: Date.now()
    };
    // บันทึกลง Firebase
    db.ref("orders").push(order).then(()=>{
      dispatch({type:"CLEAR"});setCartOpen(false);setSuccess(true);
      if(onOrderPlaced)onOrderPlaced();
    });
  }

  return(<>
    <div style={S.main}>
      <div style={S.hero}>
        <div>
          <div style={S.heroTag}>NEW ARRIVAL</div>
          <h1 style={S.heroH1}>สินค้าคุณภาพดี<br/>ราคาสบายกระเป๋า</h1>
          <p style={S.heroSub}>ของดี มีคุณภาพ ส่งไวทั่วไทย</p>
        </div>
        <div style={S.heroEmoji}>🛍️</div>
      </div>
      <div style={S.filterRow}>{cats.map(c=><button key={c} style={S.filterBtn(filter===c)} onClick={()=>setFilter(c)}>{c}</button>)}</div>
      <div style={S.grid}>
        {filtered.map(p=>(
          <div key={p.id} style={S.card}>
            <div style={S.cardImg}>{typeof p.image==="string"&&p.image.startsWith("<img")?<span dangerouslySetInnerHTML={{__html:p.image}}/>:p.image}</div>
            <div style={S.cardBody}>
              <div style={S.cardCat}>{p.category}</div>
              <div style={S.cardName}>{p.name}</div>
              <div style={S.cardDesc}>{p.desc}</div>
              <div style={S.cardFoot}>
                <div><div style={S.cardPrice}>฿{p.price.toLocaleString()}</div>
                  <span style={S.stockBadge(p.stock>0)}>{p.stock>0?`เหลือ ${p.stock}`:"หมด"}</span></div>
                <button style={{...S.addBtn,opacity:p.stock===0?.4:1}} disabled={p.stock===0} onClick={()=>dispatch({type:"ADD",product:p})}>+ ใส่ตะกร้า</button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
    {/* CART */}
    <div style={{...S.panel,...(cartOpen?S.panelOpen:{})}}>
      <div style={S.panelHead}>
        <span style={{fontWeight:700,fontSize:16}}>🛒 ตะกร้าสินค้า</span>
        <span style={{color:"#a0aec0",fontSize:12}}>{totalQty} ชิ้น</span>
      </div>
      <div style={S.panelBody}>
        {cart.length===0?<div style={S.emptyCart}><div style={{fontSize:44}}>🛒</div><div style={{marginTop:10}}>ยังไม่มีสินค้า</div></div>
          :cart.map(item=>(
            <div key={item.id} style={S.cartItem}>
              <div style={S.cartEmoji}>{item.image}</div>
              <div style={S.cartInfo}>
                <div style={S.cartName}>{item.name}</div>
                <div style={S.cartPrice}>฿{(item.price*item.qty).toLocaleString()}</div>
                <div style={S.qtyBox}>
                  <button style={S.qtyBtn} onClick={()=>dispatch({type:"UPDATE_QTY",id:item.id,qty:item.qty-1})}>−</button>
                  <span style={S.qtyNum}>{item.qty}</span>
                  <button style={S.qtyBtn} onClick={()=>dispatch({type:"UPDATE_QTY",id:item.id,qty:item.qty+1})}>+</button>
                </div>
              </div>

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[products,setProducts]=useState(INITIAL_PRODUCTS);
  const[cart,dispatch]=useReducer(cartReducer,[]);
  const[cartOpen,setCartOpen]=useState(false);
  const[view,setView]=useState("shop");
  const[newOrderCount,setNewOrderCount]=useState(0);
  const[totalSpent,setTotalSpent]=useState(0);

  // load customer total spent
  useEffect(()=>{
    if(!user||user.role!=="customer")return;
    const uid=user.id||user.uid;
    const ref=db.ref("orders").orderByChild("userId").equalTo(uid);
    ref.on("value",snap=>{
      let t=0;snap.forEach(c=>{const o=c.val();if(o.status!=="ยกเลิก")t+=o.total||0;});
      setTotalSpent(t);
    });
    return()=>ref.off();
  },[user]);

  if(!user)return <AuthPage onLogin={u=>{setUser(u);setView("shop");}}/>;
  const cartCount=cart.reduce((s,i)=>s+i.qty,0);

  return(
    <div style={S.app}>
      <Navbar user={user} cartCount={cartCount}
        onCartToggle={()=>setCartOpen(o=>!o)}
        onLogout={()=>{setUser(null);dispatch({type:"CLEAR"});setCartOpen(false);setView("shop");}}
        onGoAdmin={()=>{setView("admin");setNewOrderCount(0);}}
        onGoShop={()=>setView("shop")}
        onGoHistory={()=>setView("history")}
        view={view} newOrders={newOrderCount} totalSpent={totalSpent}/>
      {view==="shop"&&<ShopView products={products} cart={cart} dispatch={dispatch} cartOpen={cartOpen} setCartOpen={setCartOpen} user={user}
          onOrderPlaced={()=>{if(user.role==="admin")setNewOrderCount(n=>n+1);}}/>}
      {view==="admin"&&<AdminView products={products} setProducts={setProducts}/>}
      {view==="history"&&<OrderHistory user={user} onBack={()=>setView("shop")}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
