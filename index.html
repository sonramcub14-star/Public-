function randomDate() {

}

// ─── CART REDUCER ─────────────────────────────────────────────────────────────
function cartReducer(state,action){
  switch(action.type){
    case"ADD":{const ex=state.find(i=>i.id===action.product.id);if(ex)return state.map(i=>i.id===action.product.id?{...i,qty:i.qty+1}:i);return[...state,{...action.product,qty:1}];}
    case"REMOVE":return state.filter(i=>i.id!==action.id);
    case"UPDATE_QTY":return state.map(i=>i.id===action.id?{...i,qty:Math.max(1,action.qty)}:i);
    case"CLEAR":return[];
    default:return state;
  }
}

// ─── AUTH ──────────────────────────────────────────────────────────────────────
function AuthPage({users,setUsers,onLogin}){
  const[mode,setMode]=useState("login");
  const[lEmail,setLEmail]=useState(""),[ lPass,setLPass]=useState(""),[ lErr,setLErr]=useState("");
  const[rName,setRName]=useState(""),[ rEmail,setREmail]=useState(""),[ rPass,setRPass]=useState("");
  const[rPass2,setRPass2]=useState(""),[ rPhone,setRPhone]=useState(""),[ rErr,setRErr]=useState(""),[ rOk,setROk]=useState("");

  function handleLogin(){
    if(lEmail===ADMIN_ACCOUNT.email&&lPass===ADMIN_ACCOUNT.password){onLogin(ADMIN_ACCOUNT);return;}
    const found=MOCK_USERS.find(u=>u.email===lEmail&&u.password===lPass)||users.find(u=>u.email===lEmail&&u.password===lPass);
    if(!found){setLErr("อีเมลหรือรหัสผ่านไม่ถูกต้อง");return;}
    setLErr("");onLogin(found);
  }
  function handleRegister(){
    if(!rName.trim()){setRErr("กรุณากรอกชื่อ-นามสกุล");return;}
    if(!rEmail.includes("@")){setRErr("รูปแบบอีเมลไม่ถูกต้อง");return;}
    if([ADMIN_ACCOUNT.email,...MOCK_USERS.map(u=>u.email),...users.map(u=>u.email)].includes(rEmail)){setRErr("อีเมลนี้ถูกใช้งานแล้ว");return;}
    if(rPass.length<6){setRErr("รหัสผ่านต้องมีอย่างน้อย 6 ตัว");return;}
    if(rPass!==rPass2){setRErr("รหัสผ่านไม่ตรงกัน");return;}
    setUsers(prev=>[...prev,{id:Date.now(),name:rName.trim(),email:rEmail.trim(),password:rPass,phone:rPhone,role:"customer",joinDate:new Date().toLocaleDateString("th-TH")}]);

function ShopView({products,cart,dispatch,cartOpen,setCartOpen,user,addOrder}){

  const cats=["ทั้งหมด",...Array.from(new Set(products.map(p=>p.category)))];
  const filtered=filter==="ทั้งหมด"?products:products.filter(p=>p.category===filter);
  const totalQty=cart.reduce((s,i)=>s+i.qty,0);
  const totalPrice=cart.reduce((s,i)=>s+i.qty*i.price,0);
  function handleCheckout(){
    addOrder({id:`ORD-${String(Date.now()).slice(-6)}`,userId:user.id,userName:user.name,
      items:cart.map(i=>({...i})),total:totalPrice,status:"รอดำเนินการ",

        </div>
        <div style={S.heroEmoji}>🛍️</div>
      </div>
      <div style={S.filterRow}>{cats.map(c=><button key={c} style={S.filterBtn(filter===c)} onClick={()=>setFilter(c)}>{c}</button>)}</div>
      <div style={S.grid}>
        {filtered.map(p=>(
          <div key={p.id} style={S.card}>
            <div style={S.cardImg}>{p.image}</div>
            <div style={S.cardBody}>
              <div style={S.cardCat}>{p.category}</div>
              <div style={S.cardName}>{p.name}</div>
              <div style={S.cardDesc}>{p.desc}</div>
              <div style={S.cardFoot}>
                <div><div style={S.cardPrice}>฿{p.price.toLocaleString()}</div>

                <button style={{...S.addBtn,opacity:p.stock===0?.4:1}} disabled={p.stock===0} onClick={()=>dispatch({type:"ADD",product:p})}>+ ใส่ตะกร้า</button>

        <span style={{color:"#a0aec0",fontSize:12}}>{totalQty} ชิ้น</span>
      </div>
      <div style={S.panelBody}>
        {cart.length===0?<div style={S.emptyCart}><div style={{fontSize:44}}>🛒</div><div style={{marginTop:10}}>ยังไม่มีสินค้า</div></div>

                  <span style={S.qtyNum}>{item.qty}</span>
                  <button style={S.qtyBtn} onClick={()=>dispatch({type:"UPDATE_QTY",id:item.id,qty:item.qty+1})}>+</button>

                </div>
              </div>

        <div style={S.summaryTotal}><span>ยอดรวม</span><span style={{color:"#e94560"}}>฿{totalPrice.toLocaleString()}</span></div>

      <button style={{...S.primaryBtn,marginTop:0}} onClick={()=>setSuccess(false)}>ช้อปต่อ</button>
    </div></div>}
  </>);
}

const PAGE_SIZE=20;
function AdminView({products,setProducts,users,orders,onStatusChange}){

  const[editing,setEditing]=useState({});
  const[newP,setNewP]=useState({name:"",price:"",category:"",stock:"",image:"📦",desc:""});

  const[selectedOrder,setSelectedOrder]=useState(null);
  const[memberSearch,setMemberSearch]=useState("");
  const[memberPage,setMemberPage]=useState(1);
  const[orderPage,setOrderPage]=useState(1);
  const allOrders=[...MOCK_ORDERS,...orders];
  const allCustomers=[...MOCK_USERS,...users.filter(u=>u.role==="customer")];
  const totalRevenue=allOrders.filter(o=>o.status!=="ยกเลิก").reduce((s,o)=>s+o.total,0);
  const filteredOrders=allOrders.filter(o=>statusFilter==="ทั้งสถานะ"||o.status===statusFilter).filter(o=>o.id.includes(search)||o.userName.toLowerCase().includes(search.toLowerCase()));
  const orderPages=Math.ceil(filteredOrders.length/PAGE_SIZE);
  const pagedOrders=filteredOrders.slice((orderPage-1)*PAGE_SIZE,orderPage*PAGE_SIZE);
  const filteredMembers=allCustomers.filter(u=>u.name.toLowerCase().includes(memberSearch.toLowerCase())||u.email.toLowerCase().includes(memberSearch.toLowerCase()));
  const memberPages=Math.ceil(filteredMembers.length/PAGE_SIZE);
  const pagedMembers=filteredMembers.slice((memberPage-1)*PAGE_SIZE,memberPage*PAGE_SIZE);
  function updateStatus(orderId,newStatus){
    MOCK_ORDERS.forEach(o=>{if(o.id===orderId)o.status=newStatus;});
    updateLiveOrder(orderId,newStatus);
    if(onStatusChange)onStatusChange(orderId,newStatus);
    if(selectedOrder?.id===orderId)setSelectedOrder(o=>({...o,status:newStatus}));
  }
  function saveEdit(id){setProducts(prev=>prev.map(p=>p.id===id?{...p,...editing[id],price:Number(editing[id].price||p.price),stock:Number(editing[id].stock||p.stock)}:p));setEditing(v=>{const n={...v};delete n[id];return n;});}
  function addProduct(){if(!newP.name||!newP.price)return;setProducts(prev=>[...prev,{...newP,id:Date.now(),price:Number(newP.price),stock:Number(newP.stock||0)}]);setNewP({name:"",price:"",category:"",stock:"",image:"📦",desc:""});}

        {[["dashboard","📊 Dashboard"],["orders","📦 คำสั่งซื้อ"],["members","👥 สมาชิก"],["products","🏷️ สินค้า"]].map(([k,l])=>(
          <button key={k} style={S.tab(tab===k)} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>
      {tab==="dashboard"&&<>
        <div style={S.statGrid}>
          {[[allOrders.length,"คำสั่งซื้อทั้งหมด","#e94560"],[`฿${totalRevenue.toLocaleString()}`,"รายได้รวม","#e94560",20],
            [allOrders.filter(o=>o.status==="รอดำเนินการ").length,"รอดำเนินการ","#f5a623"],
            [allOrders.filter(o=>o.status==="กำลังจัดส่ง").length,"กำลังจัดส่ง","#3182ce"],
            [allOrders.filter(o=>o.status==="จัดส่งแล้ว").length,"จัดส่งแล้ว","#38a169"],
            [allCustomers.length,"สมาชิกทั้งหมด","#3182ce"],
            [products.length,"รายการสินค้า","#e94560"],
            [products.reduce((s,p)=>s+p.stock,0).toLocaleString(),"สต็อกรวม","#e94560"]
          ].map(([n,l,c,fs],i)=>(
            <div key={i} style={S.statCard}><div style={{...S.statNum,color:c,fontSize:fs||26}}>{n}</div><div style={S.statLabel}>{l}</div></div>

          <div style={{fontWeight:700,marginBottom:12,fontSize:14}}>🏆 TOP 10 ลูกค้ายอดซื้อสูงสุด</div>

          <div style={S.addRow}>
            {[["name","ชื่อสินค้า",130],["price","ราคา",72],["category","หมวดหมู่",95],["stock","สต็อก",64],["image","Emoji",56],["desc","คำอธิบาย",170]].map(([k,ph,w])=>(
              <input key={k} style={{...S.input,width:w,marginBottom:0}} placeholder={ph} value={newP[k]} onChange={e=>setNewP(p=>({...p,[k]:e.target.value}))}/>
            ))}
            <button style={S.btn("#e94560")} onClick={addProduct}>เพิ่มสินค้า</button>
          </div>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={S.table}>
            <thead><tr>{["#","สินค้า","หมวดหมู่","ราคา","สต็อก","จัดการ"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>{products.map(p=>{const ed=editing[p.id];return(
              <tr key={p.id}>
                <td style={S.td}>{p.image}</td>
                <td style={S.td}><strong>{p.name}</strong><br/><span style={{color:"#999",fontSize:11}}>{p.desc}</span></td>
                <td style={S.td}>{p.category}</td>
                <td style={S.td}>{ed?<input style={S.editInput} value={ed.price??p.price} onChange={e=>setEditing(v=>({...v,[p.id]:{...v[p.id],price:e.target.value}}))}/>:`฿${p.price.toLocaleString()}`}</td>
                <td style={S.td}>{ed?<input style={S.editInput} value={ed.stock??p.stock} onChange={e=>setEditing(v=>({...v,[p.id]:{...v[p.id],stock:e.target.value}}))}/>:<span style={S.stockBadge(p.stock>0)}>{p.stock}</span>}</td>
                <td style={S.td}>{ed?<><button style={S.btn("#38a169")} onClick={()=>saveEdit(p.id)}>บันทึก</button><button style={S.btn("#718096")} onClick={()=>setEditing(v=>{const n={...v};delete n[p.id];return n;})}>ยกเลิก</button></>:<><button style={S.btn("#3182ce")} onClick={()=>setEditing(v=>({...v,[p.id]:{price:p.price,stock:p.stock}}))}>แก้ไข</button><button style={S.btn("#e53e3e")} onClick={()=>setProducts(prev=>prev.filter(x=>x.id!==p.id))}>ลบ</button></>}</td>
              </tr>);})}</tbody>
          </table>
        </div>
      </>}
      <OrderModal order={selectedOrder} onClose={()=>setSelectedOrder(null)} onStatusChange={(id,st)=>{updateStatus(id,st);setSelectedOrder(o=>({...o,status:st}));}}/>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[users,setUsers]=useState([]);
  const[products,setProducts]=useState(INITIAL_PRODUCTS);
  const[tick,setTick]=useState(0);
  const[cart,dispatch]=useReducer(cartReducer,[]);
  const[cartOpen,setCartOpen]=useState(false);
  const[view,setView]=useState("shop");
  if(!user)return <AuthPage users={users} setUsers={setUsers} onLogin={u=>{setUser(u);setView("shop");}}/>;
  const cartCount=cart.reduce((s,i)=>s+i.qty,0);
  function addOrder(order){addLiveOrder(order);setTick(t=>t+1);}
  return(
    <div style={S.app}>
      <Navbar user={user} cartCount={cartCount}
        onCartToggle={()=>setCartOpen(o=>!o)}
        onLogout={()=>{setUser(null);dispatch({type:"CLEAR"});setCartOpen(false);}}
        onGoAdmin={()=>setView("admin")} onGoShop={()=>setView("shop")} view={view}/>
      {view==="shop"
        ?<ShopView products={products} cart={cart} dispatch={dispatch} cartOpen={cartOpen} setCartOpen={setCartOpen} user={user} addOrder={addOrder}/>
        :<AdminView products={products} setProducts={setProducts} users={users} orders={getLiveOrders()} onStatusChange={(id,st)=>{updateLiveOrder(id,st);setTick(t=>t+1);}}/>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
