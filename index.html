// ─── CART REDUCER ─────────────────────────────────────────────────────────────
function cartReducer(state,action){
  switch(action.type){
    case"ADD":{const ex=state.find(i=>i.id===action.product.id);if(ex)return state.map(i=>i.id===action.product.id?{...i,qty:i.qty+1}:i);return[...state,{...action.product,qty:1}];}
    case"REMOVE":return state.filter(i=>i.id!==action.id);
    case"UPDATE_QTY":return state.map(i=>i.id===action.id?{...i,qty:Math.max(1,action.qty)}:i);
    case"CLEAR":return[];
    default:return state;
  }
}

// ─── AUTH ──────────────────────────────────────────────────────────────────────
function AuthPage({onLogin}){
  const[mode,setMode]=useState("login");
  const[lEmail,setLEmail]=useState(""),[ lPass,setLPass]=useState(""),[ lErr,setLErr]=useState("");
  const[rName,setRName]=useState(""),[ rEmail,setREmail]=useState(""),[ rPass,setRPass]=useState("");
  const[rPass2,setRPass2]=useState(""),[ rPhone,setRPhone]=useState(""),[ rErr,setRErr]=useState(""),[ rOk,setROk]=useState("");

  function handleLogin(){
    if(lEmail===ADMIN_ACCOUNT.email&&lPass===ADMIN_ACCOUNT.password){onLogin(ADMIN_ACCOUNT);return;}
    // check Firebase users
    db.ref("users").orderByChild("email").equalTo(lEmail).once("value",snap=>{
      let found=null;
      snap.forEach(c=>{const u=c.val();if(u.password===lPass)found={...u,uid:c.key};});
      if(!found){setLErr("อีเมลหรือรหัสผ่านไม่ถูกต้อง");return;}
      setLErr("");onLogin(found);
    });
  }

  function handleRegister(){
    if(!rName.trim()){setRErr("กรุณากรอกชื่อ-นามสกุล");return;}
    if(!rEmail.includes("@")){setRErr("รูปแบบอีเมลไม่ถูกต้อง");return;}
    if(rPass.length<6){setRErr("รหัสผ่านต้องมีอย่างน้อย 6 ตัว");return;}
    if(rPass!==rPass2){setRErr("รหัสผ่านไม่ตรงกัน");return;}
    // check duplicate email
    db.ref("users").orderByChild("email").equalTo(rEmail).once("value",snap=>{
      if(snap.exists()){setRErr("อีเมลนี้ถูกใช้งานแล้ว");return;}
      const newRef=db.ref("users").push();
      newRef.set({name:rName.trim(),email:rEmail.trim(),password:rPass,phone:rPhone,role:"customer",
        joinDate:new Date().toLocaleDateString("th-TH")});
      setROk("สมัครสำเร็จ! กำลังพาไปหน้าล็อกอิน...");
      setTimeout(()=>{setMode("login");setLEmail(rEmail);setROk("");},1400);
    });
  }

  return(
    <div style={S.authWrap}>
      <div style={S.authCard}>
        <div style={S.authLogo}>🛍️ ShopTH</div>
        <div style={S.authSub}>ร้านค้าออนไลน์ครบวงจร</div>
        <div style={S.tabRow2}>
          <button style={S.tab2(mode==="login")} onClick={()=>{setMode("login");setLErr("");setRErr("");}}>เข้าสู่ระบบ</button>
          <button style={S.tab2(mode==="register")} onClick={()=>{setMode("register");setLErr("");setRErr("");}}>สมัครสมาชิก</button>
        </div>
        {mode==="login"&&<>
          {lErr&&<div style={S.errorBox}>⚠️ {lErr}</div>}
          <label style={S.label}>อีเมล</label>
          <input style={S.input} placeholder="example@email.com" value={lEmail} onChange={e=>setLEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
          <label style={S.label}>รหัสผ่าน</label>
          <input style={S.input} type="password" placeholder="••••••" value={lPass} onChange={e=>setLPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
          <button style={S.primaryBtn} onClick={handleLogin}>เข้าสู่ระบบ</button>
          
        </>}
        {mode==="register"&&<>
          {rErr&&<div style={S.errorBox}>⚠️ {rErr}</div>}
          {rOk&&<div style={S.successBox}>✅ {rOk}</div>}
          <label style={S.label}>ชื่อ-นามสกุล *</label>
          <input style={S.input} placeholder="สมชาย ใจดี" value={rName} onChange={e=>setRName(e.target.value)}/>
          <label style={S.label}>อีเมล *</label>
          <input style={S.input} placeholder="example@email.com" value={rEmail} onChange={e=>setREmail(e.target.value)}/>
          <label style={S.label}>เบอร์โทรศัพท์</label>
          <input style={S.input} placeholder="08x-xxx-xxxx" value={rPhone} onChange={e=>setRPhone(e.target.value)}/>
          <label style={S.label}>รหัสผ่าน * (อย่างน้อย 6 ตัว)</label>
          <input style={S.input} type="password" placeholder="••••••" value={rPass} onChange={e=>setRPass(e.target.value)}/>
          <label style={S.label}>ยืนยันรหัสผ่าน *</label>
          <input style={S.input} type="password" placeholder="••••••" value={rPass2} onChange={e=>setRPass2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleRegister()}/>
          <button style={S.primaryBtn} onClick={handleRegister}>สมัครสมาชิก</button>
        </>}
      </div>
    </div>
  );
}

  </>);
}

function OrderModal({order,onClose}){
  const[status,setStatus]=useState(order?.status||"");

  if(!order)return null;
  function saveStatus(){
    db.ref(`orders/${order.key}`).update({status});
    onClose();
  }
  return(
    <div style={S.overlay} onClick={onClose}>
      <div style={S.modal} onClick={e=>e.stopPropagation()}>
        <div style={S.modalHead}>
          <div style={S.modalTitle}>📋 {order.key?.slice(-6).toUpperCase()}</div>

// ─── ADMIN ────────────────────────────────────────────────────────────────────
const PAGE_SIZE=20;
function AdminView({products,setProducts}){
  const[tab,setTab]=useState("orders");
  const[orders,setOrders]=useState([]);
  const[members,setMembers]=useState([]);
  const[search,setSearch]=useState("");
  const[statusFilter,setStatusFilter]=useState("ทั้งสถานะ");
  const[selectedOrder,setSelectedOrder]=useState(null);
  const[memberSearch,setMemberSearch]=useState("");
  const[memberPage,setMemberPage]=useState(1);
  const[orderPage,setOrderPage]=useState(1);
  const[editing,setEditing]=useState({});
  const[newP,setNewP]=useState({name:"",price:"",category:"",stock:"",image:"📦",desc:""});

  // ── load orders realtime ──
  useEffect(()=>{
    const ref=db.ref("orders").orderByChild("createdAt");
    ref.on("value",snap=>{
      const list=[];
      snap.forEach(c=>list.unshift({...c.val(),key:c.key}));
      setOrders(list);
    });
    return()=>ref.off();
  },[]);

  // ── load members ──
  useEffect(()=>{
    db.ref("users").on("value",snap=>{
      const list=[];
      snap.forEach(c=>list.push({...c.val(),uid:c.key}));
      setMembers(list);
    });
    return()=>db.ref("users").off();
  },[]);

  const filteredOrders=orders
    .filter(o=>statusFilter==="ทั้งสถานะ"||o.status===statusFilter)
    .filter(o=>(o.key||"").includes(search)||o.userName?.toLowerCase().includes(search.toLowerCase()));
  const orderPages=Math.ceil(filteredOrders.length/PAGE_SIZE)||1;
  const pagedOrders=filteredOrders.slice((orderPage-1)*PAGE_SIZE,orderPage*PAGE_SIZE);

  const filteredMembers=members.filter(u=>u.name?.toLowerCase().includes(memberSearch.toLowerCase())||u.email?.toLowerCase().includes(memberSearch.toLowerCase()));
  const memberPages=Math.ceil(filteredMembers.length/PAGE_SIZE)||1;
  const pagedMembers=filteredMembers.slice((memberPage-1)*PAGE_SIZE,memberPage*PAGE_SIZE);

  const totalRevenue=orders.filter(o=>o.status!=="ยกเลิก").reduce((s,o)=>s+(o.total||0),0);

  function saveEdit(id){setProducts(prev=>prev.map(p=>p.id===id?{...p,...editing[id],price:Number(editing[id].price||p.price),stock:Number(editing[id].stock||p.stock)}:p));setEditing(v=>{const n={...v};delete n[id];return n;});}
  function addProduct(){if(!newP.name||!newP.price)return;setProducts(prev=>[...prev,{...newP,id:Date.now(),price:Number(newP.price),stock:Number(newP.stock||0)}]);setNewP({name:"",price:"",category:"",stock:"",image:"📦",desc:""});}
  function getMemberOrders(uid){return orders.filter(o=>o.userId===uid);}

  return(
    <div style={S.adminWrap}>
      <div style={S.adminTitle}>⚙️ แผงควบคุมแอดมิน</div>
      <div style={S.tabRow}>
        {[["orders","📦 คำสั่งซื้อ"],["dashboard","📊 Dashboard"],["members","👥 สมาชิก"],["products","🏷️ สินค้า"]].map(([k,l])=>(
          <button key={k} style={S.tab(tab===k)} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>

      {tab==="orders"&&<>
        <div style={S.searchBar}>
          <input style={S.searchInput} placeholder="🔍 ค้นหาชื่อลูกค้า..." value={search} onChange={e=>{setSearch(e.target.value);setOrderPage(1);}}/>
          <select style={S.select} value={statusFilter} onChange={e=>{setStatusFilter(e.target.value);setOrderPage(1);}}>
            <option>ทั้งสถานะ</option>{STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
          <span style={{fontSize:12,color:"#888"}}>ทั้งหมด {filteredOrders.length} รายการ</span>
        </div>
        {orders.length===0&&<div style={{textAlign:"center",padding:40,color:"#aaa",background:"#fff",borderRadius:12}}>
          <div style={{fontSize:48,marginBottom:12}}>📭</div>
          <div>ยังไม่มีคำสั่งซื้อ<br/>รอลูกค้าสั่งซื้อครับ</div>
        </div>}
        {orders.length>0&&<>{
          // group by customer
          (() => {
            const grouped = {};
            filteredOrders.forEach(o=>{
              const key = o.userId||o.userName;
              if(!grouped[key]) grouped[key]={name:o.userName, orders:[]};
              grouped[key].orders.push(o);
            });
            return Object.values(grouped).map(group=>(
              <div key={group.name} style={{marginBottom:20}}>
                {/* customer header */}
                <div style={{background:"#1a1a2e",color:"#fff",borderRadius:"11px 11px 0 0",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:700,fontSize:14}}>👤 {group.name}</span>
                  <span style={{fontSize:12,color:"#a0aec0"}}>{group.orders.length} ออเดอร์ | ฿{group.orders.filter(o=>o.status!=="ยกเลิก").reduce((s,o)=>s+(o.total||0),0).toLocaleString()}</span>
                </div>
                <div style={{background:"#fff",borderRadius:"0 0 11px 11px",boxShadow:"0 2px 8px rgba(0,0,0,.07)",overflow:"hidden"}}>
                  {group.orders.map((o,idx)=>(
                    <div key={o.key} style={{padding:"12px 16px",borderBottom:idx<group.orders.length-1?"1px solid #f5f5f5":"none",display:"flex",gap:10,alignItems:"flex-start",flexWrap:"wrap"}}>
                      <div style={{flex:1,minWidth:200}}>
                        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                          <strong style={{color:"#3182ce",fontSize:13}}>#{o.key?.slice(-6).toUpperCase()}</strong>
                          <span style={{fontSize:11,color:"#888"}}>{o.date}</span>
                          <span style={S.statusBadge(o.status)}>{o.status}</span>
                        </div>
                        <div style={{fontSize:12,color:"#555",marginBottom:4}}>
                          {o.items&&o.items.map((it,i)=><span key={i} style={{marginRight:8}}>{it.image} {it.name} ×{it.qty}</span>)}
                        </div>
                        <strong style={{color:"#e94560",fontSize:14}}>฿{o.total?.toLocaleString()}</strong>
                      </div>
                      <div style={{display:"flex",gap:6,flexShrink:0}}>
                        <button style={S.btn("#3182ce")} onClick={()=>setSelectedOrder(o)}>ดู/แก้</button>
                        <button style={S.btn("#e53e3e")} onClick={()=>{if(window.confirm("ลบออเดอร์นี้?"))db.ref("orders/"+o.key).remove();}}>ลบ</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ));
          })()
        }</>}
      </>}

      {tab==="dashboard"&&<>
        <div style={S.statGrid}>
          {[[orders.length,"คำสั่งซื้อทั้งหมด","#e94560"],[`฿${totalRevenue.toLocaleString()}`,"รายได้รวม","#e94560",20],
            [orders.filter(o=>o.status==="รอดำเนินการ").length,"รอดำเนินการ","#f5a623"],
            [orders.filter(o=>o.status==="กำลังจัดส่ง").length,"กำลังจัดส่ง","#3182ce"],
            [orders.filter(o=>o.status==="จัดส่งแล้ว").length,"จัดส่งแล้ว","#38a169"],
            [members.length,"สมาชิก","#3182ce"],[products.length,"สินค้า","#e94560"]
          ].map(([n,l,c,fs],i)=>(
            <div key={i} style={S.statCard}><div style={{...S.statNum,color:c,fontSize:fs||26}}>{n}</div><div style={S.statLabel}>{l}</div></div>
          ))}
        </div>
      </>}

      {tab==="members"&&<>
        <div style={S.searchBar}>
          <input style={S.searchInput} placeholder="🔍 ค้นหาชื่อหรืออีเมล..." value={memberSearch} onChange={e=>{setMemberSearch(e.target.value);setMemberPage(1);}}/>
          <span style={{fontSize:12,color:"#888"}}>ทั้งหมด {filteredMembers.length} คน</span>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={S.table}>
            <thead><tr>{["#","ชื่อ","อีเมล","เบอร์โทร","วันสมัคร","ออเดอร์","ยอดรวม"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>

              {pagedMembers.map((u,i)=>{
                const mo=getMemberOrders(u.uid),mt=mo.filter(o=>o.status!=="ยกเลิก").reduce((s,o)=>s+(o.total||0),0);
                return(<tr key={u.uid}>

        <div style={{overflowX:"auto"}}>
          <table style={S.table}>
            <thead><tr>{["#","สินค้า","หมวดหมู่","ราคา","สต็อก","จัดการ"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>{products.map(p=>{const ed=editing[p.id];return(
              <tr key={p.id}>
                <td style={S.td}>{p.image}</td>
                <td style={S.td}><strong>{p.name}</strong><br/><span style={{color:"#999",fontSize:11}}>{p.desc}</span></td>
                <td style={S.td}>{p.category}</td>
                <td style={S.td}>{ed?<input style={{padding:"5px 7px",borderRadius:6,border:"1.5px solid #ddd",width:74,fontSize:12,fontFamily:"inherit"}} value={ed.price??p.price} onChange={e=>setEditing(v=>({...v,[p.id]:{...v[p.id],price:e.target.value}}))}/>:`฿${p.price.toLocaleString()}`}</td>
                <td style={S.td}>{ed?<input style={{padding:"5px 7px",borderRadius:6,border:"1.5px solid #ddd",width:74,fontSize:12,fontFamily:"inherit"}} value={ed.stock??p.stock} onChange={e=>setEditing(v=>({...v,[p.id]:{...v[p.id],stock:e.target.value}}))}/>:<span style={S.stockBadge(p.stock>0)}>{p.stock}</span>}</td>
                <td style={S.td}>{ed?<><button style={S.btn("#38a169")} onClick={()=>saveEdit(p.id)}>บันทึก</button><button style={S.btn("#718096")} onClick={()=>setEditing(v=>{const n={...v};delete n[p.id];return n;})}>ยกเลิก</button></>:<><button style={S.btn("#3182ce")} onClick={()=>setEditing(v=>({...v,[p.id]:{price:p.price,stock:p.stock}}))}>แก้ไข</button><button style={S.btn("#e53e3e")} onClick={()=>setProducts(prev=>prev.filter(x=>x.id!==p.id))}>ลบ</button></>}</td>
              </tr>);})}
            </tbody>
          </table>
        </div>
      </>}

      <OrderModal order={selectedOrder} onClose={()=>setSelectedOrder(null)}/>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[products,setProducts]=useState(INITIAL_PRODUCTS);
  const[cart,dispatch]=useReducer(cartReducer,[]);
  const[cartOpen,setCartOpen]=useState(false);
  const[view,setView]=useState("shop");
  const[newOrderCount,setNewOrderCount]=useState(0);
  const[totalSpent,setTotalSpent]=useState(0);

  // load customer total spent
  useEffect(()=>{
    if(!user||user.role!=="customer")return;
    const uid=user.id||user.uid;
    const ref=db.ref("orders").orderByChild("userId").equalTo(uid);
    ref.on("value",snap=>{
      let t=0;snap.forEach(c=>{const o=c.val();if(o.status!=="ยกเลิก")t+=o.total||0;});
      setTotalSpent(t);
    });
    return()=>ref.off();
  },[user]);

  if(!user)return <AuthPage onLogin={u=>{setUser(u);setView("shop");}}/>;
  const cartCount=cart.reduce((s,i)=>s+i.qty,0);

  return(
    <div style={S.app}>
      <Navbar user={user} cartCount={cartCount}
        onCartToggle={()=>setCartOpen(o=>!o)}
        onLogout={()=>{setUser(null);dispatch({type:"CLEAR"});setCartOpen(false);setView("shop");}}
        onGoAdmin={()=>{setView("admin");setNewOrderCount(0);}}
        onGoShop={()=>setView("shop")}
        onGoHistory={()=>setView("history")}
        view={view} newOrders={newOrderCount} totalSpent={totalSpent}/>
      {view==="shop"&&<ShopView products={products} cart={cart} dispatch={dispatch} cartOpen={cartOpen} setCartOpen={setCartOpen} user={user}
          onOrderPlaced={()=>{if(user.role==="admin")setNewOrderCount(n=>n+1);}}/>}
      {view==="admin"&&<AdminView products={products} setProducts={setProducts}/>}
      {view==="history"&&<OrderHistory user={user} onBack={()=>setView("shop")}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
